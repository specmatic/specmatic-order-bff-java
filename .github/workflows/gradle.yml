name: Java CI with Gradle

run-name: ${{ inputs.orchestrator_run_suffix && format('Java CI with Gradle - {0}', inputs.orchestrator_run_suffix) || github.workflow }}
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: contracts changed
  workflow_dispatch:
    # Internal inputs used by Specmatic's test orchestrator. Sample project users can ignore these.
    inputs:
      enterprise_version:
        description: Specmatic Enterprise version under test
        required: false
        type: string
      enterprise_artifact_url:
        description: Specmatic Enterprise jar/artifact URL under test
        required: false
        type: string
      orchestrator_run_suffix:
        description: Test orchestrator run suffix
        required: false
        type: string

jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: docker
            testName: ContractTestsUsingTestContainer
            needsCliInstall: false
          - name: cli
            testName: ContractTestUsingCLITest
            needsCliInstall: true
          - name: junit
            testName: ContractTests
            needsCliInstall: false
    env:
      CTRF_REPORT_PATH: './build/reports/specmatic/test/ctrf/*.json'
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Save Specmatic license
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.specmatic
          echo "${{ secrets.SPECMATIC_LICENSE_KEY }}" > ~/.specmatic/specmatic-license.txt

      # Internal setup required by Specmatic. Sample project users can ignore this block.
      - if: ${{ inputs.orchestrator_run_suffix != '' }}
        uses: specmatic/specmatic-github-workflows/action-orchestrator-setup@main
        with:
          orchestrator-run-suffix: ${{ inputs.orchestrator_run_suffix }}
          docker-hub-username: ${{ vars.SPECMATIC_DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.SPECMATIC_DOCKER_HUB_TOKEN }}
      # End: internal setup required by Specmatic.

      - name: Download Specmatic Enterprise Jar
        if: ${{ matrix.needsCliInstall }}
        env:
          ENTERPRISE_VERSION: ${{ inputs.enterprise_version }}
          ENTERPRISE_ARTIFACT_URL: ${{ inputs.enterprise_artifact_url }}
        run: |
          set -euo pipefail
          mkdir -p ~/.specmatic

          if [ -n "${ENTERPRISE_ARTIFACT_URL}" ]; then
            curl -fsSL "${ENTERPRISE_ARTIFACT_URL}" -o ~/.specmatic/specmatic-enterprise.jar
            echo "Downloaded Enterprise jar from workflow_dispatch enterprise_artifact_url"
          elif [ -n "${ENTERPRISE_VERSION}" ]; then
            curl -fsSL https://docs.specmatic.io/install-specmatic-enterprise.sh | bash -s -- --version "${ENTERPRISE_VERSION}"
            echo "Installed Enterprise jar for version ${ENTERPRISE_VERSION}"
          else
            curl -fsSL https://docs.specmatic.io/install-specmatic-enterprise.sh | bash
            echo "Installed default Enterprise jar"
          fi

      - name: Run BFF Contract Test
        shell: bash
        env:
          ENTERPRISE_VERSION: ${{ inputs.enterprise_version }}
        run: |
          set -euo pipefail

          ./gradlew test \
            --tests="com.component.orders.contract.${{ matrix.testName }}" \
            ${ENTERPRISE_VERSION:+-PspecmaticEnterpriseVersion=${ENTERPRISE_VERSION}} 

      - name: Upload CTRF Report
        uses: actions/upload-artifact@v6
        if: always() # Run even if tests fail
        with:
          name: ctrf-report-${{ matrix.name }}
          path: ${{ env.CTRF_REPORT_PATH }}
          retention-days: 5

      # Display CTRF test results
      - name: Publish Test Results
        uses: ctrf-io/github-test-reporter@v1
        if: always() # Run even if tests fail
        with:
          report-path: ${{ env.CTRF_REPORT_PATH }}

      - name: Run coverage report without re-running the tests
        run: ./gradlew jacocoTestReport -x test

      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv

      - name: Log coverage percentage
        run: |
          echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
          echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"

      - name: Publish Build Reports to Specmatic Insights
        if: ${{ github.ref == 'refs/heads/main' && inputs.orchestrator_run_suffix == '' }}
        run: |
          docker run \
            --rm \
            -e GIT_DISCOVERY_ACROSS_FILESYSTEM=1 \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/usr/src/app \
            -v "${{ github.workspace }}:/usr/src/app" \
            -v "${HOME}/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            specmatic/enterprise \
            send-report \
            --metadata build_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --branch-name ${{ github.ref_name }} \
            --repo-name ${{ github.event.repository.name }} \
            --repo-id ${{ github.repository_id }} \
            --repo-url ${{ github.event.repository.html_url }}

      - name: Upload HTML Test Report
        uses: actions/upload-artifact@v6
        with:
          name: html-report-${{ matrix.name }}
          path: build/reports/specmatic/test/html

  docker:
    if: ${{ github.ref == 'refs/heads/main' && inputs.orchestrator_run_suffix == '' }}
    needs: buildAndTest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        run: echo ${{ secrets.SPECMATIC_DEMO_DOCKER_HUB_TOKEN }} | docker login -u ${{ vars.SPECMATIC_DEMO_DOCKER_HUB_USERNAME }} --password-stdin

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: specmaticdemo/${{ github.event.repository.name }}

      - name: Assemble project for Docker image
        run: ./gradlew assemble

      - name: Build and push Docker image (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            specmaticdemo/${{ github.event.repository.name }}:latest
          labels: ${{ steps.meta.outputs.labels }}
